spring.application.name=demogw

server.port= 9090

# ======================
# Spring Cloud Gateway (WebMVC) - Routes
# Nota: en WebMVC el path es spring.cloud.gateway.server.webmvc.routes[...]
# ======================

# ---- Route 0: vuelos ----
spring.cloud.gateway.server.webmvc.routes[0].id=ms-vuelos_route
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/ms-vuelos/v1/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

# ---- Route 1: personas ----
spring.cloud.gateway.server.webmvc.routes[1].id=ms-menu_route
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/ms-menu/v1/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

# ======================
# Actuator
# ======================
management.endpoints.web.exposure.include=health,info,metrics,prometheus



# ============ Eureka Client ============
# IMPORTANTE: 'defaultZone' es case-sensitive
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/spring-realm

spring.main.allow-bean-definition-overriding=true